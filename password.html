<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Required - MovieIGuess</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/22dc8d85a3.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --netflix-red: #E50914;
            --netflix-red-dark: #b20710;
            --netflix-black: #141414;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
            overflow: hidden;
            background: var(--netflix-black);
            font-family: "DM Sans", sans-serif;
        }

        .brand-font {
            font-family: "Bebas Neue", sans-serif;
        }

        .password-input:focus {
            border-color: var(--netflix-red);
            outline: none;
        }

        @keyframes shake {
            0%   { transform: translateX(0); }
            20%  { transform: translateX(-8px); }
            40%  { transform: translateX(8px); }
            60%  { transform: translateX(-6px); }
            80%  { transform: translateX(6px); }
            100% { transform: translateX(0); }
        }

        .shake {
            animation: shake 0.4s ease;
        }
    </style>
</head>
<body class="min-h-screen overflow-hidden bg-[#141414] text-white">
    <main class="min-h-screen flex items-center justify-center px-6">
        <section class="w-full max-w-[380px] text-center">
            <h1 class="brand-font text-[#E50914] text-[48px] leading-none tracking-[1px] mb-2">
                MOVIEIGUESS
            </h1>
            <p class="text-gray-400 text-[14px] mb-8">
                Members only. Enter your password.
            </p>

            <div class="space-y-4">
                <div id="passwordInputWrap" class="relative">
                    <input
                        id="passwordInput"
                        class="password-input w-full h-12 rounded-lg border border-[#333] bg-[#2a2a2a] px-4 pr-12 text-[14px] text-white placeholder:text-gray-500 transition-colors"
                        type="password"
                        placeholder="Enter password"
                        autocomplete="current-password"
                    >
                    <button
                        id="passwordToggle"
                        class="absolute right-0 top-0 flex h-12 w-12 items-center justify-center text-gray-400 transition-colors hover:text-white"
                        type="button"
                        aria-label="Show password"
                    >
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>

                <button
                    id="passwordSubmit"
                    class="brand-font h-12 w-full rounded-lg bg-[#E50914] text-[18px] tracking-[1px] text-white transition-all hover:bg-[#b20710] active:scale-[0.98]"
                    type="button"
                >
                    ENTER
                </button>

                <p id="passwordError" class="hidden text-center text-[13px] text-[#E50914]" style="display: none;">
                    Incorrect password. Try again.
                </p>
            </div>
        </section>
    </main>

    <script type="module" src="src/password.js"></script>
</body>
</html>
